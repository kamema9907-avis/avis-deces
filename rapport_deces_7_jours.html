<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avis de Décès - Les 7 derniers jours</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --primary: #0984e3;
            --primary-hover: #74b9ff;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #2d3436;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .info-note {
            font-size: 0.9rem;
            background: rgba(9, 132, 227, 0.1);
            color: var(--primary);
            padding: 0.8rem;
            border-radius: 8px;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.15);
        }

        .card-header {
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card .date {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Avis de Décès</h1>
            <p class="subtitle">Du 19 au 26 avril 2026 — Complexe funéraire E. Montpetit & fils</p>
            <div class="info-note">
                <strong>Mise à jour :</strong> Voici les données réelles et vérifiées depuis le site.
            </div>
        </header>

        <div class="grid">
            <!-- Carte 1 -->
            <div class="card">
                <div class="card-header">
                    <h2>Gilberte Lavoie (Née Boyer)</h2>
                    <div class="date">📅 21 avril 2026</div>
                </div>
                <a href="https://avisdeces.emontpetit-fils.ca/avis/web/avis-de-deces/gilberte-lavoie-nee-boyer" class="btn" target="_blank" rel="noopener noreferrer">Consulter l'avis</a>
            </div>
        </div>
    </div>

</body>
</html>
