name: Mise à jour quotidienne des avis de décès
on:
  schedule:
    - cron: '0 12,0 * * *'
  workflow_dispatch: 
jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout du dépôt
      uses: actions/checkout@v3
    - name: Configuration de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
    - name: Exécution du script
      run: python scraper.py
    - name: Commit et Push des changements
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add donnees_deces.json donnees_deces.js
        git commit -m "Mise à jour automatique des décès" || echo "Aucun changement à commiter"
        git push
